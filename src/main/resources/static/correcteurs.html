<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Correcteurs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            color: #ffffff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1), 
                        0 4px 16px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .content {
            padding: 40px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-add {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 12px 20px;
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-card {
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(40, 40, 40, 0.8);
            color: #ffffff;
        }

        .correcteur-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(40, 40, 40, 0.8);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .correcteur-table th {
            background: rgba(76, 175, 80, 0.3);
            color: #ffffff;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .correcteur-table td {
            padding: 15px;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .correcteur-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .correcteur-table tr:last-child td {
            border-bottom: none;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .card-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-edit, .btn-delete {
            padding: 8px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }

        .btn-delete {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }

        .btn-edit:hover, .btn-delete:hover {
            transform: translateY(-1px);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-save {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 12px 20px;
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #4a9eff;
            font-size: 1.2em;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid rgba(0, 255, 0, 0.3);
            color: #51cf66;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .correcteur-table {
                font-size: 0.9em;
            }
            
            .correcteur-table th,
            .correcteur-table td {
                padding: 10px;
            }
            
            .section-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Retour</a>
            <h1>Correcteurs</h1>
            <p>Gestion des correcteurs</p>
        </div>
        
        <div class="content">
            <div class="actions-bar">
                <button class="btn-add" onclick="showAddForm()">+ Ajouter un Correcteur</button>
                <button class="btn-refresh" onclick="loadCorrecteurs()">Actualiser</button>
            </div>

            <div id="formContainer" style="display: none;">
                <div class="form-card">
                    <h3 id="formTitle">Ajouter un Correcteur</h3>
                    <form id="correcteurForm">
                        <input type="hidden" id="correcteurId">
                        <div class="form-group">
                            <label for="nom">Nom du correcteur:</label>
                            <input type="text" id="nom" placeholder="Entrez le nom du correcteur" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-save">Enregistrer</button>
                            <button type="button" class="btn-cancel" onclick="hideForm()">Annuler</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div id="correcteursContainer">
                <div class="loading">Chargement des correcteurs...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8084/api';

        document.addEventListener('DOMContentLoaded', () => {
            loadCorrecteurs();
        });

        document.getElementById('correcteurForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const correcteurId = document.getElementById('correcteurId').value;
            const nom = document.getElementById('nom').value.trim();
            
            const data = { nom: nom };

            try {
                console.log('Données envoyées:', data);
                
                let response;
                if (correcteurId) {
                    response = await fetch(`${API_BASE_URL}/correcteurs/${correcteurId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch(`${API_BASE_URL}/correcteurs`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                }

                console.log('Response status:', response.status);
                
                if (response.ok) {
                    alert('Correcteur sauvegardé avec succès!');
                    hideForm();
                    loadCorrecteurs();
                } else {
                    const errorText = await response.text();
                    console.error('Erreur response:', errorText);
                    alert('Erreur lors de la sauvegarde: ' + errorText);
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de la sauvegarde: ' + error.message);
            }
        });

        async function loadCorrecteurs() {
            try {
                const response = await fetch(`${API_BASE_URL}/correcteurs`);
                const correcteurs = await response.json();
                
                const container = document.getElementById('correcteursContainer');
                container.innerHTML = `
                    <table class="correcteur-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${correcteurs.map(correcteur => `
                                <tr>
                                    <td>#${correcteur.id}</td>
                                    <td>${correcteur.nom}</td>
                                    <td>
                                        <div class="table-actions">
                                            <button class="btn-edit" onclick="editCorrecteur(${correcteur.id})">Modifier</button>
                                            <button class="btn-delete" onclick="deleteCorrecteur(${correcteur.id})">Supprimer</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function showAddForm() {
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Ajouter un Correcteur';
            document.getElementById('correcteurForm').reset();
            document.getElementById('correcteurId').value = '';
        }

        function hideForm() {
            document.getElementById('formContainer').style.display = 'none';
        }

        async function editCorrecteur(id) {
            try {
                console.log('Tentative de modification du correcteur ID:', id);
                const response = await fetch(`${API_BASE_URL}/correcteurs/${id}`);
                console.log('Response status:', response.status);
                const correcteur = await response.json();
                console.log('Données reçues:', correcteur);
                
                document.getElementById('formContainer').style.display = 'block';
                document.getElementById('formTitle').textContent = 'Modifier un Correcteur';
                document.getElementById('correcteurId').value = correcteur.id;
                document.getElementById('nom').value = correcteur.nom;
                console.log('Formulaire pré-rempli avec:', { id: correcteur.id, nom: correcteur.nom });
            } catch (error) {
                console.error('Erreur lors de la modification:', error);
                alert('Erreur lors du chargement du correcteur: ' + error.message);
            }
        }

        async function deleteCorrecteur(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce correcteur ?')) {
                try {
                    await fetch(`${API_BASE_URL}/correcteurs/${id}`, { method: 'DELETE' });
                    loadCorrecteurs();
                } catch (error) {
                    console.error('Erreur:', error);
                    alert('Erreur lors de la suppression');
                }
            }
        }
    </script>
</body>
</html>
