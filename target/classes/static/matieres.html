<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matières - Système de Notes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .header p {
            opacity: 0.9;
            color: rgba(255, 255, 255, 0.8);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .content {
            padding: 40px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-add {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 12px 20px;
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-card {
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(40, 40, 40, 0.8);
            color: #ffffff;
        }

        .matiere-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(40, 40, 40, 0.8);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .matiere-table th {
            background: rgba(76, 175, 80, 0.3);
            color: #ffffff;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .matiere-table td {
            padding: 15px;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .matiere-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .matiere-table tr:last-child td {
            border-bottom: none;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .card-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-edit, .btn-delete {
            padding: 8px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }

        .btn-delete {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }

        .btn-edit:hover, .btn-delete:hover {
            transform: translateY(-1px);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-save {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 12px 20px;
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #4a9eff;
            font-size: 1.2em;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid rgba(0, 255, 0, 0.3);
            color: #51cf66;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .matiere-table {
                font-size: 0.9em;
            }
            
            .matiere-table th,
            .matiere-table td {
                padding: 10px;
            }
            
            .section-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Retour</a>
            <h1>Matières</h1>
            <p>Gestion des matières</p>
        </div>
        
        <div class="content">
            <div class="actions-bar">
                <button class="btn-add" onclick="showAddForm()">+ Ajouter une Matière</button>
                <button class="btn-refresh" onclick="loadMatieres()">Actualiser</button>
            </div>

            <div id="formContainer" style="display: none;">
                <div class="form-card">
                    <h3 id="formTitle">Ajouter une Matière</h3>
                    <form id="matiereForm">
                        <input type="hidden" id="matiereId">
                        <div class="form-group">
                            <label for="nom">Nom de la matière:</label>
                            <input type="text" id="nom" placeholder="Entrez le nom de la matière" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-save">Enregistrer</button>
                            <button type="button" class="btn-cancel" onclick="hideForm()">Annuler</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div id="matieresContainer">
                <div class="loading">Chargement des matières...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8084/api';

        document.addEventListener('DOMContentLoaded', () => {
            loadMatieres();
        });

        document.getElementById('matiereForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const matiereId = document.getElementById('matiereId').value;
            const nom = document.getElementById('nom').value.trim();
            
            const data = { nom: nom };

            try {
                console.log('Données envoyées:', data);
                
                let response;
                if (matiereId) {
                    response = await fetch(`${API_BASE_URL}/matieres/${matiereId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch(`${API_BASE_URL}/matieres`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                }

                console.log('Response status:', response.status);
                hideForm();
                loadMatieres();
                alert('Matière sauvegardée avec succès!');
            } catch (error) {
                console.error('Erreur:', error);
            }
        });

        async function loadMatieres() {
            try {
                const response = await fetch(`${API_BASE_URL}/matieres`);
                const matieres = await response.json();
                
                const container = document.getElementById('matieresContainer');
                container.innerHTML = `
                    <table class="matiere-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${matieres.map(matiere => `
                                <tr>
                                    <td>#${matiere.id}</td>
                                    <td>${matiere.nom}</td>
                                    <td>
                                        <div class="table-actions">
                                            <button class="btn-edit" onclick="editMatiere(${matiere.id})">Modifier</button>
                                            <button class="btn-delete" onclick="deleteMatiere(${matiere.id})">Supprimer</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function showAddForm() {
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Ajouter une Matière';
            document.getElementById('matiereForm').reset();
            document.getElementById('matiereId').value = '';
        }

        function hideForm() {
            document.getElementById('formContainer').style.display = 'none';
        }

        async function editMatiere(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/matieres/${id}`);
                const matiere = await response.json();
                
                document.getElementById('formContainer').style.display = 'block';
                document.getElementById('formTitle').textContent = 'Modifier une Matière';
                document.getElementById('matiereId').value = matiere.id;
                document.getElementById('nom').value = matiere.nom;
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        async function deleteMatiere(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cette matière ?')) {
                try {
                    await fetch(`${API_BASE_URL}/matieres/${id}`, { method: 'DELETE' });
                    loadMatieres();
                } catch (error) {
                    console.error('Erreur:', error);
                }
            }
        }
    </script>
</body>
</html>
