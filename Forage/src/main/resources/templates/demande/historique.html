<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Historique des statuts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0c10;
            --bg-secondary: #111315;
            --bg-tertiary: #1a1d21;
            --bg-card: #1e2127;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-blue-dark: #2563eb;
            --accent-orange: #f59e0b;
            --accent-orange-dark: #d97706;
            --accent-red: #ef4444;
            --accent-red-dark: #dc2626;
            --accent-info: #06b6d4;
            --accent-info-dark: #0891b2;
            --accent-green: #10b981;
            --border-color: #2a2e35;
            --success-green: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error-red: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        /* Navigation */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            color: var(--text-primary) !important;
        }
        
        .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        /* Cards */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .card-header {
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
        }
        
        .card-header h5, .card-header h6 {
            font-weight: 600;
            margin: 0;
            font-size: 1rem;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        /* Informations de la demande */
        .info-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }
        
        .info-value {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        /* Boutons */
        .btn {
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
        }
        
        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-blue-dark);
            border-color: var(--accent-blue-dark);
        }
        
        .btn-secondary {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background-color: var(--bg-dark);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        
        /* Formulaire */
        .form-control, .form-select {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            padding: 0.5rem 0.75rem;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        /* Alertes */
        .alert {
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }
        
        .alert-success {
            background-color: var(--success-bg);
            color: var(--success-green);
            border-left: 3px solid var(--success-green);
        }
        
        .alert-danger {
            background-color: var(--error-bg);
            color: var(--error-red);
            border-left: 3px solid var(--error-red);
        }
        
        .alert-dismissible .btn-close {
            filter: brightness(0) invert(1);
            opacity: 0.5;
            padding: 1rem;
        }
        
        /* Badges */
        .badge {
            font-size: 0.7rem;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-weight: 500;
        }
        
        .badge.bg-primary {
            background-color: var(--accent-blue) !important;
        }
        
        .badge.bg-danger {
            background-color: var(--accent-red) !important;
        }
        
        .badge.bg-success {
            background-color: var(--accent-green) !important;
        }
        
        .badge.bg-secondary {
            background-color: var(--text-muted) !important;
        }
        
        /* Timeline */
        .timeline {
            margin-top: 1rem;
        }
        
        .timeline-item {
            border-left: 2px solid var(--accent-blue);
            padding: 1rem 0 1rem 1rem;
            margin-bottom: 0;
            position: relative;
        }
        
        .timeline-item:last-child {
            border-left-color: var(--accent-blue);
        }
        
        /* Texte secondaire */
        .text-secondary {
            color: var(--text-secondary) !important;
        }
        
        /* Layout */
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .card-header {
                flex-direction: column;
                gap: 0.75rem;
                align-items: stretch !important;
            }
            
            .row {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .row .col-md-3, 
            .row .col-md-4, 
            .row .col-md-6,
            .row .col-md-8 {
                width: 100%;
            }
            
            .timeline-item {
                padding: 0.75rem 0 0.75rem 1rem;
            }
        }
        
        /* Message vide */
        .empty-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Forage</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/clients">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/demandes">Demandes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Informations de la demande -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Informations de la demande</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <div class="info-label">ID</div>
                        <div class="info-value" th:text="${demande.id}">1</div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="info-label">Date</div>
                        <div class="info-value" th:text="${#temporals.format(demande.date, 'dd/MM/yyyy')}">01/01/2024</div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="info-label">Lieu</div>
                        <div class="info-value" th:text="${demande.lieu}">Lieu</div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="info-label">District</div>
                        <div class="info-value" th:text="${demande.district}">District</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="info-label">Client</div>
                        <div class="info-value">
                            <span th:if="${demande.client}" th:text="${demande.client.nom}">Nom du client</span>
                            <span th:unless="${demande.client}" class="text-secondary">Non défini</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Historique des statuts -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Historique des statuts</h5>
                <div>
                    <a href="/demandes" class="btn btn-secondary btn-sm">
                        Retour à la liste
                    </a>
                </div>
            </div>
            <div class="card-body">
                <!-- Formulaire pour changer le statut -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h6 class="mb-0">Changer le statut</h6>
                    </div>
                    <div class="card-body">
                        <form method="post" th:action="@{/demandes/changer-statut}">
                            <input type="hidden" name="demandeId" th:value="${demande.id}">
                            <div class="row">
                                <div class="col-md-8 mb-2 mb-md-0">
                                    <select name="nouveauStatut" class="form-select" required>
                                        <option value="">-- Choisir un nouveau statut --</option>
                                        <option value="DEMANDE_CREEE">DEMANDE_CREEE</option>
                                        <option value="DEMANDE_ANNULEE">DEMANDE_ANNULEE</option>
                                        <option value="DEMANDE_TERMINEE">DEMANDE_TERMINEE</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-primary w-100">
                                        Changer le statut
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Liste de l'historique -->
                <div th:if="${historique.empty}" class="empty-message">
                    <p>Aucun historique de statut trouvé pour cette demande.</p>
                </div>

                <div th:unless="${historique.empty}">
                    <div class="timeline">
                        <div th:each="demandeStatut, stat : ${historique}" class="timeline-item">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <span class="badge" 
                                          th:classappend="${#strings.contains(demandeStatut.statut.libelle, 'CREEE') ? 'bg-primary' : 
                                                         #strings.contains(demandeStatut.statut.libelle, 'ANNULEE') ? 'bg-danger' : 'bg-success'}"
                                          th:text="${demandeStatut.statut.libelle}">
                                        Statut
                                    </span>
                                    <small class="text-secondary ms-2">
                                        <span th:text="${#temporals.format(demandeStatut.date, 'dd/MM/yyyy à HH:mm')}">Date</span>
                                    </small>
                                </div>
                                <small class="text-secondary" th:text="'#' + ${stat.index + 1}">
                                    #1
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
