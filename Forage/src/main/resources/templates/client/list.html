<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Liste des Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0c10;
            --bg-secondary: #111315;
            --bg-tertiary: #1a1d21;
            --bg-card: #1e2127;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            /* Palette bleue cohérente - seul accent utilisé */
            --accent-blue: #3b82f6;
            --accent-blue-dark: #2563eb;
            --accent-blue-soft: #3b82f620;
            --accent-blue-border: #3b82f640;
            --border-color: #2a2e35;
            /* Version "warning" en bleu doux (remplace orange) */
            --action-warning: #3b82f6;
            --action-warning-dark: #2563eb;
            /* Version "danger" en bleu soutenu mais avec une nuance légèrement plus pourpre pour le contraste (mais toujours bleuté) */
            --action-danger: #4f6ef5;
            --action-danger-dark: #3b5bdb;
            /* success reste vert mais atténué pour s'harmoniser */
            --success-green: #2dd4bf;
            --success-bg: rgba(45, 212, 191, 0.1);
            --error-red: #f87171;
            --error-bg: rgba(248, 113, 113, 0.1);
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        /* Navigation */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            color: var(--text-primary) !important;
        }
        
        .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        .nav-link.active {
            color: var(--accent-blue) !important;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
        }
        
        /* Card principale */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        
        .card-header {
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
        }
        
        .card-header h4 {
            font-weight: 600;
            font-size: 1.25rem;
            margin: 0;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        /* Tableau */
        .table {
            color: var(--text-primary);
            margin-bottom: 0;
        }
        
        .table th {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.75rem;
        }
        
        .table td {
            border-color: var(--border-color);
            padding: 0.75rem;
            vertical-align: middle;
        }
        
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: rgba(26, 29, 33, 0.5);
        }
        
        .table-hover > tbody > tr:hover {
            background-color: var(--bg-tertiary);
        }
        
        /* Boutons - palette unifiée bleue */
        .btn {
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-blue-dark);
            border-color: var(--accent-blue-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        /* Bouton "Modifier" - remplacement de l'orange par un bleu secondaire élégant */
        .btn-warning {
            background-color: var(--action-warning);
            border-color: var(--action-warning);
            color: white;
        }
        
        .btn-warning:hover {
            background-color: var(--action-warning-dark);
            border-color: var(--action-warning-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        /* Bouton "Supprimer" - rouge remplacé par un bleu profond avec une touche subtile */
        .btn-danger {
            background-color: var(--action-danger);
            border-color: var(--action-danger);
            color: white;
        }
        
        .btn-danger:hover {
            background-color: var(--action-danger-dark);
            border-color: var(--action-danger-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 110, 245, 0.3);
        }
        
        .btn-outline-light {
            border: 1px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
        }
        
        .btn-outline-light:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        
        /* Boutons dans le groupe */
        .btn-group .btn {
            margin: 0 2px;
            border-radius: 6px;
        }
        
        /* Formulaire de recherche */
        .form-control {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            padding: 0.5rem 0.75rem;
        }
        
        .form-control:focus {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }
        
        .input-group {
            gap: 0.5rem;
        }
        
        .input-group .form-control {
            flex: 1;
        }
        
        .input-group .btn {
            white-space: nowrap;
        }
        
        /* Alertes */
        .alert {
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(2px);
        }
        
        .alert-success {
            background-color: var(--success-bg);
            color: var(--success-green);
            border-left: 3px solid var(--success-green);
        }
        
        .alert-danger {
            background-color: var(--error-bg);
            color: var(--error-red);
            border-left: 3px solid var(--error-red);
        }
        
        .alert-dismissible .btn-close {
            filter: brightness(0) invert(1);
            opacity: 0.5;
        }
        
        .alert-dismissible .btn-close:hover {
            opacity: 1;
        }
        
        /* Badge - uniquement bleu cohérent */
        .badge {
            font-size: 0.75rem;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .badge.bg-primary {
            background-color: var(--accent-blue) !important;
            color: white;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.2);
        }
        
        /* Texte secondaire */
        .text-secondary {
            color: var(--text-secondary) !important;
        }
        
        /* Statistiques */
        .bg-dark {
            background-color: var(--bg-tertiary) !important;
        }
        
        .card-title {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }
        
        /* scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue-dark);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .card-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch !important;
            }
            
            .card-header .btn {
                width: 100%;
            }
            
            .btn-group {
                display: flex;
                gap: 0.5rem;
                flex-wrap: wrap;
            }
            
            .btn-group .btn {
                flex: 1;
                margin: 0;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .input-group .form-control,
            .input-group .btn {
                width: 100%;
            }
            
            .table {
                font-size: 0.875rem;
            }
            
            .table th,
            .table td {
                padding: 0.5rem;
            }
        }
        
        /* Légères animations pour raffinement */
        .btn {
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        
        /* Style des liens d'action */
        a:not(.btn) {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        a:not(.btn):hover {
            color: var(--accent-blue-dark);
            text-decoration: underline;
        }
        
        /* amélioration du badge statistique */
        .stat-badge {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-blue-dark) 100%);
            padding: 0.4rem 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Forage</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/clients">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/demandes">Demandes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Card principale -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0" th:text="${title}">Liste des Clients</h4>
                <div>
                    <a href="/clients/new" class="btn btn-primary">
                        Ajouter un Client
                    </a>
                </div>
            </div>
            <div class="card-body">
                <!-- Barre de recherche -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <form method="get" action="/clients/search">
                            <div class="input-group">
                                <input type="text" name="nom" class="form-control" 
                                       placeholder="Rechercher par nom..." 
                                       th:value="${searchTerm}">
                                <button class="btn btn-outline-light" type="submit">
                                    Rechercher
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Tableau des clients -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Contact</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${clients.empty}">
                                <td colspan="4" class="text-center text-secondary py-4">
                                    Aucun client trouvé
                                </td>
                            </tr>
                            <tr th:each="client : ${clients}">
                                <td th:text="${client.id}">1</td>
                                <td th:text="${client.nom}">Nom du client</td>
                                <td th:text="${client.contact}">Contact</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/clients/edit/{id}(id=${client.id})}" 
                                           class="btn btn-warning btn-sm">
                                            Modifier
                                        </a>
                                        <a th:href="@{/clients/delete/{id}(id=${client.id})}" 
                                           class="btn btn-danger btn-sm"
                                           onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client ?')">
                                            Supprimer
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Statistiques avec design cohérent -->
                <div class="row mt-4">
                    <div class="col-md-12">
                        <div class="card bg-dark" style="border: 1px solid var(--border-color);">
                            <div class="card-body d-flex justify-content-between align-items-center flex-wrap">
                                <div>
                                    <h6 class="card-title text-secondary mb-1">Vue d'ensemble</h6>
                                    <p class="mb-0 fs-5 fw-semibold">
                                        <span class="badge stat-badge" style="background: var(--accent-blue); font-size: 0.9rem;" th:text="${#lists.size(clients)} + ' client(s)'">0 client(s)</span>
                                    </p>
                                </div>
                                <div class="mt-2 mt-sm-0">
                                    <small class="text-secondary">
                                        Dernière mise à jour: aujourd'hui
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script pour fermeture des alertes en douceur -->
    <script>
        // Améliore la fermeture des alertes avec animation
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                const closeBtn = alert.querySelector('.btn-close');
                if(closeBtn) {
                    closeBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        alert.style.transition = 'opacity 0.2s ease';
                        alert.style.opacity = '0';
                        setTimeout(() => {
                            alert.remove();
                        }, 200);
                    });
                }
            });
        });
    </script>
</body>
</html>
