<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Formulaire Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0c10;
            --bg-secondary: #111315;
            --bg-tertiary: #1a1d21;
            --bg-card: #1e2127;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-blue-dark: #2563eb;
            --border-color: #2a2e35;
            --error-red: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        /* Navigation */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            color: var(--text-primary) !important;
        }
        
        .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        /* Card principale */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        
        .card-header {
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
        }
        
        .card-header h4 {
            font-weight: 600;
            font-size: 1.25rem;
            margin: 0;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        /* Labels */
        .form-label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        /* Champs de formulaire */
        .form-control {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            padding: 0.625rem 0.75rem;
            transition: all 0.2s ease;
        }
        
        .form-control:focus {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }
        
        /* Texte d'aide */
        .form-text {
            color: var(--text-muted) !important;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        /* Messages d'erreur */
        .invalid-feedback, .text-danger {
            color: var(--error-red) !important;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        .text-danger small {
            font-size: 0.75rem;
        }
        
        /* Alertes */
        .alert {
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1rem;
        }
        
        .alert-danger {
            background-color: var(--error-bg);
            color: var(--error-red);
            border-left: 3px solid var(--error-red);
        }
        
        /* Boutons */
        .btn {
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            transition: none;
        }
        
        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-blue-dark);
            border-color: var(--accent-blue-dark);
        }
        
        .btn-secondary {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background-color: var(--bg-dark);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-outline-light {
            border: 1px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
        }
        
        .btn-outline-light:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        /* Layout */
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue-dark);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .card-body {
                padding: 1.5rem;
            }
            
            .btn {
                padding: 0.5rem 1rem;
            }
            
            .d-flex {
                flex-direction: column;
                gap: 1rem;
            }
            
            .d-flex > div {
                display: flex;
                justify-content: space-between;
                gap: 0.5rem;
            }
            
            .d-flex .btn-secondary {
                margin-bottom: 0;
            }
        }
        
        /* Validation states */
        .form-control:invalid:focus {
            border-color: var(--error-red);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        
        /* Champ requis */
        .form-label[for]::after {
            content: "*";
            color: var(--error-red);
            margin-left: 0.25rem;
        }
        
        /* Désactiver l'astérisque pour les champs non requis */
        .form-label:not([for])::after {
            content: none;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Forage</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/clients">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/demandes">Demandes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/statuts">Statuts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/devis">Devis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="${title}">Formulaire Client</h4>
                    </div>
                    <div class="card-body">
                        <!-- Formulaire -->
                        <form th:action="${action}" th:object="${client}" method="post" novalidate>
                            <!-- Champ ID (caché pour la modification) -->
                            <input type="hidden" th:field="*{id}" th:if="*{id != null}">
                            
                            <!-- Champ Nom -->
                            <div class="mb-4">
                                <label for="nom" class="form-label">Nom du client</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="nom" 
                                       th:field="*{nom}" 
                                       placeholder="Entrez le nom du client"
                                       required>
                                <div th:if="${#fields.hasErrors('nom')}" class="text-danger mt-1">
                                    <small th:errors="*{nom}"></small>
                                </div>
                            </div>

                            <!-- Champ Contact -->
                            <div class="mb-4">
                                <label for="contact" class="form-label">Contact</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="contact" 
                                       th:field="*{contact}" 
                                       placeholder="Entrez le contact (téléphone, email...)"
                                       required>
                                <div th:if="${#fields.hasErrors('contact')}" class="text-danger mt-1">
                                    <small th:errors="*{contact}"></small>
                                </div>
                                <div class="form-text">
                                    Ex: +242 06 123 456 78 ou email@example.com
                                </div>
                            </div>

                            <!-- Boutons d'action -->
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="/clients" class="btn btn-secondary">
                                    Retour à la liste
                                </a>
                                <div>
                                    <button type="reset" class="btn btn-outline-light me-2">
                                        Réinitialiser
                                    </button>
                                    <button type="submit" class="btn btn-primary">
                                        <span th:if="*{id == null}">Ajouter</span>
                                        <span th:if="*{id != null}">Mettre à jour</span>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Validation JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const nomInput = document.getElementById('nom');
            const contactInput = document.getElementById('contact');
            
            // Validation du nom
            nomInput.addEventListener('input', function() {
                if (this.value.trim().length > 100) {
                    this.setCustomValidity('Le nom ne doit pas dépasser 100 caractères');
                } else if (this.value.trim().length === 0) {
                    this.setCustomValidity('Le nom est obligatoire');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            // Validation du contact
            contactInput.addEventListener('input', function() {
                if (this.value.trim().length > 20) {
                    this.setCustomValidity('Le contact ne doit pas dépasser 20 caractères');
                } else if (this.value.trim().length === 0) {
                    this.setCustomValidity('Le contact est obligatoire');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            // Validation avant soumission
            form.addEventListener('submit', function(event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            });
        });
    </script>
</body>
</html>
