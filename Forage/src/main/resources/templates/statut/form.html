<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Formulaire Statut</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0c10;
            --bg-secondary: #111315;
            --bg-tertiary: #1a1d21;
            --bg-card: #1e2127;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-blue-dark: #2563eb;
            --accent-orange: #f59e0b;
            --accent-orange-dark: #d97706;
            --accent-red: #ef4444;
            --accent-red-dark: #dc2626;
            --accent-green: #10b981;
            --border-color: #2a2e35;
            --error-red: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        /* Navigation */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            color: var(--text-primary) !important;
        }
        
        .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        /* Cards */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .card-header {
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
        }
        
        .card-header h4, .card-header h6 {
            font-weight: 600;
            margin: 0;
        }
        
        .card-header h4 {
            font-size: 1.25rem;
        }
        
        .card-header h6 {
            font-size: 1rem;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        /* Labels */
        .form-label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        /* Champs de formulaire */
        .form-control {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            padding: 0.5rem 0.75rem;
        }
        
        .form-control:focus {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }
        
        /* Alertes */
        .alert {
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        
        .alert-danger {
            background-color: var(--error-bg);
            color: var(--error-red);
            border-left: 3px solid var(--error-red);
        }
        
        /* Boutons */
        .btn {
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
        }
        
        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-blue-dark);
            border-color: var(--accent-blue-dark);
        }
        
        .btn-secondary {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background-color: var(--bg-dark);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        /* Badges */
        .badge {
            font-size: 0.7rem;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-weight: 500;
            display: inline-block;
        }
        
        .badge.bg-primary {
            background-color: var(--accent-blue) !important;
        }
        
        .badge.bg-danger {
            background-color: var(--accent-red) !important;
        }
        
        .badge.bg-success {
            background-color: var(--accent-green) !important;
        }
        
        /* Texte secondaire */
        .text-secondary {
            color: var(--text-secondary) !important;
        }
        
        .small {
            font-size: 0.75rem !important;
        }
        
        /* Layout */
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        
        /* Espacements */
        .mb-3 {
            margin-bottom: 1rem !important;
        }
        
        .mt-1 {
            margin-top: 0.25rem !important;
        }
        
        .mt-2 {
            margin-top: 0.5rem !important;
        }
        
        .mt-3 {
            margin-top: 1rem !important;
        }
        
        /* Grid */
        .d-grid {
            display: grid;
        }
        
        .gap-2 {
            gap: 0.5rem;
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue-dark);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .card-header {
                padding: 0.875rem 1rem;
            }
            
            .card-body {
                padding: 1rem;
            }
            
            .d-md-flex {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .btn {
                width: 100%;
            }
            
            .row .col-md-4 {
                margin-bottom: 0.5rem;
            }
        }
        
        /* Champ requis */
        .form-label[for="libelle"]::after {
            content: "*";
            color: var(--error-red);
            margin-left: 0.25rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Forage</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/clients">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/demandes">Demandes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/statuts">Statuts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/devis">Devis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0" th:text="${title}">Formulaire Statut</h4>
                    </div>
                    <div class="card-body">
                        <!-- Messages d'erreur -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <span th:text="${error}"></span>
                        </div>

                        <form th:action="${action}" method="post" th:object="${statut}">
                            <!-- Champ ID pour la modification -->
                            <input type="hidden" th:if="*{id}" th:field="*{id}">
                            
                            <!-- Libellé -->
                            <div class="mb-3">
                                <label for="libelle" class="form-label">Libellé du statut</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="libelle" 
                                       th:field="*{libelle}"
                                       placeholder="Ex: DEMANDE_CREEE"
                                       maxlength="50"
                                       required>
                                <div class="text-secondary small mt-1">
                                    Le libellé doit être unique et ne pas dépasser 50 caractères.
                                </div>
                                <!-- Erreurs de validation -->
                                <div th:if="${#fields.hasErrors('libelle')}" class="text-danger small mt-1">
                                    <span th:errors="*{libelle}"></span>
                                </div>
                            </div>
                            
                            <!-- Boutons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/statuts" class="btn btn-secondary">Annuler</a>
                                <button type="submit" class="btn btn-primary">
                                    <span th:if="*{id}">Mettre à jour</span>
                                    <span th:unless="*{id}">Ajouter</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Informations supplémentaires -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h6 class="mb-0">Statuts par défaut</h6>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 mb-2 mb-md-0">
                                <span class="badge bg-primary">DEMANDE_CREEE</span>
                            </div>
                            <div class="col-md-4 mb-2 mb-md-0">
                                <span class="badge bg-danger">DEMANDE_ANNULEE</span>
                            </div>
                            <div class="col-md-4">
                                <span class="badge bg-success">DEMANDE_TERMINEE</span>
                            </div>
                        </div>
                        <div class="text-secondary small mt-2">
                            Ces statuts sont créés automatiquement au démarrage de l'application.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
