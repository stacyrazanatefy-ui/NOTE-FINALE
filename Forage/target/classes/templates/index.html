<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Gestion de Forage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0c10;
            --bg-secondary: #111315;
            --bg-tertiary: #1a1d21;
            --bg-card: #1e2127;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-blue-dark: #2563eb;
            --accent-orange: #f59e0b;
            --border-color: #2a2e35;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        /* Navigation */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            color: var(--text-primary) !important;
        }
        
        .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        /* Hero Section */
        .hero-section {
            padding: 4rem 0 2rem 0;
        }
        
        .hero-content h1 {
            font-size: 5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--accent-blue);
            text-align: center;
        }
        
        /* Section Titre */
        .section-title {
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--text-primary);
        }
        
        /* Statistiques */
        .stats-section {
            padding: 2rem 0 4rem 0;
        }
        
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem 3rem;
            text-align: center;
            min-width: 280px;
        }
        
        .stat-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 3rem;
            }
            
            .section-title {
                font-size: 2rem;
            }
            
            .stat-card {
                min-width: 240px;
                padding: 1.5rem 2rem;
            }
            
            .stat-number {
                font-size: 2.5rem;
            }
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue-dark);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Forage</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/clients">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/demandes">Demandes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/statuts">Statuts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/devis">Devis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container">
            <div class="hero-content">
                <h1>ETU3641</h1>
            </div>
        </div>
    </section>

    <!-- Statistiques Section -->
    <section class="stats-section">
        <div class="container">
            <h2 class="section-title">Statistiques</h2>
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number" id="clientCount">0</div>
                    <div class="stat-label">Clients</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="demandeCount">0</div>
                    <div class="stat-label">Demandes</div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Animation des statistiques -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Animation des compteurs
            function animateCounter(elementId, target, duration = 2000) {
                const element = document.getElementById(elementId);
                const increment = target / (duration / 16);
                let current = 0;
                
                const timer = setInterval(() => {
                    current += increment;
                    if (current >= target) {
                        current = target;
                        clearInterval(timer);
                    }
                    element.textContent = Math.floor(current);
                }, 16);
            }
            
            // Charger les vraies statistiques depuis l'API
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    animateCounter('clientCount', data.clients);
                    animateCounter('demandeCount', data.demandes);
                })
                .catch(error => {
                    console.error('Erreur lors du chargement des statistiques:', error);
                    // Valeurs par défaut en cas d'erreur
                    animateCounter('clientCount', 0);
                    animateCounter('demandeCount', 0);
                });
        });
    </script>
</body>
</html>
