<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Formulaire Demande</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0c10;
            --bg-secondary: #111315;
            --bg-tertiary: #1a1d21;
            --bg-card: #1e2127;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-blue-dark: #2563eb;
            --accent-orange: #f59e0b;
            --accent-orange-dark: #d97706;
            --accent-red: #ef4444;
            --accent-red-dark: #dc2626;
            --border-color: #2a2e35;
            --success-green: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error-red: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --info-blue: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.1);
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        /* Navigation */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue) !important;
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            color: var(--text-primary) !important;
        }
        
        .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        /* Card principale */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        
        .card-header {
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
        }
        
        .card-header h4 {
            font-weight: 600;
            font-size: 1.25rem;
            margin: 0;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        /* Labels */
        .form-label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        /* Champs de formulaire */
        .form-control, .form-select {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            padding: 0.625rem 0.75rem;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }
        
        .form-select {
            cursor: pointer;
        }
        
        /* Texte d'aide */
        .form-text {
            color: var(--text-muted) !important;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        .form-text a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        .form-text a:hover {
            text-decoration: underline;
        }
        
        /* Messages d'erreur */
        .invalid-feedback, .text-danger {
            color: var(--error-red) !important;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        .text-danger small {
            font-size: 0.75rem;
        }
        
        /* Alertes */
        .alert {
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
        }
        
        .alert-danger {
            background-color: var(--error-bg);
            color: var(--error-red);
            border-left: 3px solid var(--error-red);
        }
        
        .alert-info {
            background-color: var(--info-bg);
            color: var(--info-blue);
            border-left: 3px solid var(--info-blue);
        }
        
        .alert-info a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        .alert-info a:hover {
            text-decoration: underline;
        }
        
        /* Boutons */
        .btn {
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            transition: none;
        }
        
        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-blue-dark);
            border-color: var(--accent-blue-dark);
        }
        
        .btn-primary:disabled {
            background-color: var(--text-muted);
            border-color: var(--text-muted);
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background-color: var(--bg-dark);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-outline-light {
            border: 1px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
        }
        
        .btn-outline-light:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        
        /* Layout */
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue-dark);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .card-body {
                padding: 1.5rem;
            }
            
            .btn {
                padding: 0.5rem 1rem;
            }
            
            .d-flex {
                flex-direction: column;
                gap: 1rem;
            }
            
            .d-flex > div {
                display: flex;
                justify-content: space-between;
                gap: 0.5rem;
            }
            
            .d-flex .btn-secondary {
                margin-bottom: 0;
            }
            
            .row {
                flex-direction: column;
            }
        }
        
        /* Validation states */
        .form-control:invalid:focus, .form-select:invalid:focus {
            border-color: var(--error-red);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        
        /* Champ requis */
        .form-label[for]::after {
            content: "*";
            color: var(--error-red);
            margin-left: 0.25rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Forage</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/clients">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/demandes">Demandes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/statuts">Statuts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/devis">Devis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0" th:text="${title}">Formulaire Demande</h4>
                    </div>
                    <div class="card-body">
                        <!-- Message d'information si pas de clients -->
                        <div th:if="${clients.empty}" class="alert alert-info">
                            Aucun client n'est disponible. 
                            <a href="/clients/new" class="btn btn-sm btn-primary ms-2">
                                Ajouter un client
                            </a>
                        </div>

                        <!-- Formulaire -->
                        <form th:action="${action}" th:object="${demande}" method="post" novalidate>
                            <!-- Champ ID (caché pour la modification) -->
                            <input type="hidden" th:field="*{id}" th:if="*{id != null}">
                            
                            <div class="row">
                                <!-- Champ Date -->
                                <div class="col-md-4 mb-4">
                                    <label for="date" class="form-label">Date de la demande</label>
                                    <input type="date" 
                                           class="form-control" 
                                           id="date" 
                                           th:field="*{date}" 
                                           required>
                                    <div th:if="${#fields.hasErrors('date')}" class="text-danger mt-1">
                                        <small th:errors="*{date}"></small>
                                    </div>
                                </div>

                                <!-- Champ Client -->
                                <div class="col-md-8 mb-4">
                                    <label for="client" class="form-label">Client</label>
                                    <select class="form-select" id="client" th:field="*{client.id}" required>
                                        <option value="">Sélectionnez un client...</option>
                                        <option th:each="client : ${clients}" 
                                                th:value="${client.id}"
                                                th:text="${client.nom + ' - ' + client.contact}"
                                                th:selected="${demande.client != null and demande.client.id == client.id}">
                                            Nom du client
                                        </option>
                                    </select>
                                    <div th:if="${#fields.hasErrors('client')}" class="text-danger mt-1">
                                        <small th:errors="*{client}"></small>
                                    </div>
                                    <div class="form-text">
                                        Si le client n'existe pas, <a href="/clients/new">créez-le d'abord</a>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <!-- Champ Lieu -->
                                <div class="col-md-6 mb-4">
                                    <label for="lieu" class="form-label">Lieu du forage</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="lieu" 
                                           th:field="*{lieu}" 
                                           placeholder="Ex: Village, quartier, etc."
                                           required>
                                    <div th:if="${#fields.hasErrors('lieu')}" class="text-danger mt-1">
                                        <small th:errors="*{lieu}"></small>
                                    </div>
                                </div>

                                <!-- Champ District -->
                                <div class="col-md-6 mb-4">
                                    <label for="district" class="form-label">District</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="district" 
                                           th:field="*{district}" 
                                           placeholder="Ex: District, commune, etc."
                                           required>
                                    <div th:if="${#fields.hasErrors('district')}" class="text-danger mt-1">
                                        <small th:errors="*{district}"></small>
                                    </div>
                                </div>
                            </div>

                            <!-- Boutons d'action -->
                            <div class="d-flex justify-content-between">
                                <a href="/demandes" class="btn btn-secondary">
                                    Retour à la liste
                                </a>
                                <div>
                                    <button type="reset" class="btn btn-outline-light me-2">
                                        Réinitialiser
                                    </button>
                                    <button type="submit" class="btn btn-primary" th:disabled="${clients.empty}">
                                        <span th:if="*{id == null}">Ajouter</span>
                                        <span th:if="*{id != null}">Mettre à jour</span>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Validation JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const dateInput = document.getElementById('date');
            const lieuInput = document.getElementById('lieu');
            const districtInput = document.getElementById('district');
            const clientSelect = document.getElementById('client');
            
            // Validation de la date
            dateInput.addEventListener('input', function() {
                const selectedDate = new Date(this.value);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                if (this.value === '') {
                    this.setCustomValidity('La date est obligatoire');
                } else if (selectedDate > today) {
                    this.setCustomValidity('La date ne peut pas être dans le futur');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            // Validation du lieu
            lieuInput.addEventListener('input', function() {
                if (this.value.trim().length > 200) {
                    this.setCustomValidity('Le lieu ne doit pas dépasser 200 caractères');
                } else if (this.value.trim().length === 0) {
                    this.setCustomValidity('Le lieu est obligatoire');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            // Validation du district
            districtInput.addEventListener('input', function() {
                if (this.value.trim().length > 100) {
                    this.setCustomValidity('Le district ne doit pas dépasser 100 caractères');
                } else if (this.value.trim().length === 0) {
                    this.setCustomValidity('Le district est obligatoire');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            // Validation du client
            clientSelect.addEventListener('change', function() {
                if (this.value === '') {
                    this.setCustomValidity('Le client est obligatoire');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            // Validation avant soumission
            form.addEventListener('submit', function(event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            });
        });
    </script>
</body>
</html>
